<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة وجيه | النظام المنفصل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #1e3c72; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; color: #333; }
        .container { background: white; padding: 30px; border-radius: 20px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; }
        .btn { width: 100%; padding: 12px; background: #2a5298; color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        #dashboard { display: none; }
    </style>
</head>
<body>

    <div id="login-page" class="container">
        <h2>مرحباً بك في موقع وجيه</h2>
        <input type="text" id="user" placeholder="اسم المستخدم">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="handleLogin()">دخول للمنصة</button>
    </div>

    <div id="dashboard" class="container">
        <h2 style="color: #2ecc71;">أهلاً بك، <span id="user-display"></span></h2>
        <p>رصيدك الحالي: <b id="balance-display"></b></p>
        <button class="btn" style="background: #e74c3c;" onclick="location.reload()">خروج</button>
    </div>

    <script>
        async function handleLogin() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;

            // هام جداً: استبدل هذا الرابط برابط السيرفر بعد رفعه (مثلاً على Render)
            const API_URL = "// استخدم العنوان اللي ظهر لك في السيرفر
const API_URL = "http://127.0.0.1:5000/login"; 
"; 

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const result = await response.json();

                if (response.ok) {
                    document.getElementById('login-page').style.display = 'none';
                    document.getElementById('dashboard').style.display = 'block';
                    document.getElementById('user-display').innerText = result.user;
                    document.getElementById('balance-display').innerText = result.balance;
                } else {
                    alert(result.message);
                }
            } catch (error) {
                alert("تعذر الاتصال بسيرفر البايثون! تأكد أنه يعمل.");
            }
        }
    </script>
</body>
</html>
